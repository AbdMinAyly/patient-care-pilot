# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Fix v047 polish labels
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-v047-polish-labels.yml
      - .github/fix-v047-polish-labels.py
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/fix-v047-polish-labels.py
      - name: Validate
        run: |
          node --check app.js
          test "$(node -e "global.window={};require('./data/content.js');process.stdout.write(window.PATIENT_CARE_CONTENT.meta.contentVersion)")" = "v047"
          node - <<'NODE'
          global.window={};require('./data/content.js');
          const l=window.PATIENT_CARE_CONTENT.guides.iron.labels;
          for(const key of ['backTo','choosePrompt','readLabel','actionLabel','openTopicTemplate'])if(!l[key])throw new Error('missing '+key);
          console.log('labels ok');
          NODE
          git diff --check
      - name: Commit label fix
        run: |
          rm -f .github/fix-v047-polish-labels.py .github/workflows/fix-v047-polish-labels.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix v047 polish labels"
          git push origin main
