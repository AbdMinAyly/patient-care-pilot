# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Build dual vitamin D protocol selector
on:
  push:
    paths:
      - .github/physician_protocols_build.py
      - .github/workflows/physician_protocols_build.yml
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python .github/physician_protocols_build.py
      - run: node --check app.js
      - run: node -e "require('vm').runInNewContext(require('fs').readFileSync('data/content.js','utf8'),{window:{}})"
      - run: node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'))"
      - run: git diff --check
      - run: grep -q "Endocrine Society 2024" app.js
      - run: grep -q "Local clinic protocol" app.js
      - run: grep -q "pc_pilot_v022_profile" app.js
      - run: rm .github/physician_protocols_build.py .github/workflows/physician_protocols_build.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add dual vitamin D protocol selector"
          git push origin main
