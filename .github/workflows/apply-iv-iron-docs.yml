# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Apply IV iron calculator docs
on:
  push:
    branches: [main]
    paths:
      - '.github/apply_iv_iron_docs.py'
      - '.github/workflows/apply-iv-iron-docs.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply documentation
        run: python .github/apply_iv_iron_docs.py
      - name: Validate
        run: |
          node --check app.js
          node --check iron-tools.js
          node --check iron-iv-ida.js
          node --check exercise-tools.js
          node --check vitd-protocol-v2.js
          node -e "const fs=require('fs'),vm=require('vm');const c={window:{}};vm.createContext(c);vm.runInContext(fs.readFileSync('data/content.js','utf8'),c);"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'))"
          git diff --check
          grep -q "weight*(target-hb)*2.4+stores" iron-iv-ida.js
          grep -q "Ferritin is a monitoring target only" iron-iv-ida.js
          grep -q "iron-iv-ida.js" index.html
          grep -q "pc_pilot_v022_profile" app.js
      - name: Commit and clean helper
        run: |
          rm -f .github/apply_iv_iron_docs.py .github/workflows/apply-iv-iron-docs.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PATIENT_CARE_RULES.md docs/HISTORY.md .github
          git commit -m "Document and validate automatic IV iron calculator"
          git push
