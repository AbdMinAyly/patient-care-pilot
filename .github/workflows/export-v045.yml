name: Verify v045 Clarity Pass

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply source repair once
        id: repair
        shell: bash
        run: |
          if [ -f clarity-v045.js ]; then
            cat .github/v045-repair.*.b64 | tr -d '\n' | base64 -d | gzip -d > /tmp/repair_v045.py
            sed -i "s#root=Path('/tmp/v045ws/repo')#root=Path.cwd()#" /tmp/repair_v045.py
            python3 /tmp/repair_v045.py
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Static verification
        shell: bash
        run: |
          node --check app.js
          test "$(node -e "global.window={};require('./data/content.js');process.stdout.write(window.PATIENT_CARE_CONTENT.meta.contentVersion)")" = "v045"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          cmp PATIENT_CARE_CORE.md docs/PATIENT_CARE_CORE.md
          ! grep -q "v043" upload_to_github.cmd
          ! grep -R "clarity-v045" index.html app.js styles.css
          test ! -e clarity-v045.js
          test ! -e clarity-v045.css

      - name: Install browser verification runtime
        shell: bash
        run: |
          mkdir -p /tmp/v045-browser
          cd /tmp/v045-browser
          npm init -y
          npm install playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Browser, responsive, and print verification
        shell: bash
        run: |
          set -o pipefail
          cat .github/v045-verify.b64 | tr -d '\n' | base64 -d | gzip -d > /tmp/v045-browser/verify.mjs
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/v045-http.log 2>&1 &
          sleep 2
          cd /tmp/v045-browser
          node verify.mjs 2>&1 | tee "$GITHUB_WORKSPACE/v045-browser-report.txt"

      - name: Upload browser verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v045-browser-report
          path: v045-browser-report.txt
          if-no-files-found: warn

      - name: Commit repaired v045 source
        if: steps.repair.outputs.applied == 'true' && success()
        shell: bash
        run: |
          rm -f .github/v045-repair.*.b64
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Patient Care v045 — repair clarity pass"
          git push

      - name: Remove temporary verification helpers
        if: steps.repair.outputs.applied == 'false' && success()
        shell: bash
        run: |
          rm -f .github/v045-verify.b64 .github/workflows/export-v045.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove temporary v045 verification helpers"
          git push

# trigger: capture current browser failures
