# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Apply HEAL medical-profile diet flow
on:
  push:
    branches: [main]
    paths:
      - .github/apply-heal-medical-profile-diet.py
      - .github/workflows/apply-heal-medical-profile-diet.yml
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/apply-heal-medical-profile-diet.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "function dietProfileMatches" app.js
          grep -q "Based on your medical profile" app.js
          grep -q "HEAL medical-profile diet handoff" styles.css
      - run: |
          rm -f .github/apply-heal-medical-profile-diet.py .github/workflows/apply-heal-medical-profile-diet.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Connect HEAL diet flow to DR profile"
          git push
