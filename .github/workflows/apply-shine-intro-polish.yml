# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Apply SHINE focused intro polish
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-shine-intro-polish.yml
      - .github/apply-shine-intro-polish.py
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/apply-shine-intro-polish.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "shine-intro-active" app.js
          grep -q "shine-welcome-skip" app.js
          grep -q "SHINE focused introduction polish" styles.css
          grep -q "viewBox=\"0 0 24 24\"" app.js
      - run: |
          rm -f .github/apply-shine-intro-polish.py .github/workflows/apply-shine-intro-polish.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish focused SHINE introduction"
          git push
