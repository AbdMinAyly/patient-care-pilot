# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Adjust SHINE intro layout
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/adjust-shine-intro-layout.yml
      - .github/adjust-shine-intro-layout.py
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/adjust-shine-intro-layout.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "SHINE intro alignment refinement" styles.css
          grep -q "top:max(14px,env(safe-area-inset-top))" styles.css
      - run: |
          rm -f .github/adjust-shine-intro-layout.py .github/workflows/adjust-shine-intro-layout.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align SHINE intro bubbles and skip control"
          git push