# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Apply HEAL welcome and DR icon update
on:
  push:
    branches: [main]
    paths:
      - .github/apply-heal-dr-welcome.py
      - .github/workflows/apply-heal-dr-welcome.yml
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/apply-heal-dr-welcome.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "function renderHealWelcome" app.js
          grep -q "doctor-icon-points" app.js
          grep -q "HEAL nourishment and movement welcome" styles.css
          grep -q "heal-intro-active" app.js
      - run: |
          rm -f .github/apply-heal-dr-welcome.py .github/workflows/apply-heal-dr-welcome.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add HEAL welcome and simplify DR symbols"
          git push
