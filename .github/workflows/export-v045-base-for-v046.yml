name: Export verified v045 base for v046

on:
  push:
    branches:
      - v046-shine-focus-foundation
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v045-clarity-pass
          fetch-depth: 0
      - name: Create verified v045 archive
        run: zip -r verified-v045-base.zip . -x '.git/*'
      - uses: actions/upload-artifact@v4
        with:
          name: verified-v045-base
          path: verified-v045-base.zip
          if-no-files-found: error
