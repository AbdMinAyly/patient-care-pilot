# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Apply SHINE welcome screen
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-shine-welcome.yml
      - .github/apply-shine-welcome.py
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/apply-shine-welcome.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "function renderShineWelcome" app.js
          grep -q "shine-welcome-cta" app.js
          grep -q "SHINE first-entry guiding-light welcome" styles.css
          grep -q "p.guided.shineCompleted!==true" app.js
      - run: |
          rm -f .github/apply-shine-welcome.py .github/workflows/apply-shine-welcome.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add SHINE guiding-light welcome screen"
          git push
