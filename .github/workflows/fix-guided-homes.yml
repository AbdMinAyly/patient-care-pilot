# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Fix guided homes
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-guided-homes.yml
      - .github/fix-guided-homes.py
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/fix-guided-homes.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "location.hash='#/dr'" app.js
          grep -q "renderBackControl('#/pedia','Shinopedia'" app.js
      - run: |
          rm -f .github/fix-guided-homes.py .github/workflows/fix-guided-homes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finish guided homes verification"
          git push
