# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Apply guided homes
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-guided-homes.yml
      - .github/apply-guided-homes.py
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/apply-guided-homes.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');if(!window.PATIENT_CARE_CONTENT.guidedExperience)process.exit(1);console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q 'id="nav-pedia"' index.html
          grep -q "function renderPriorityWizard" app.js
          grep -q "function renderMedicalProfile" app.js
          grep -q "function renderPedia" app.js
          grep -q "pc_pilot_v022_profile" app.js
          grep -q "version:22" app.js
      - run: |
          rm -f .github/apply-guided-homes.py .github/workflows/apply-guided-homes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add guided homes and Shinopedia"
          git push
