name: Verify v046 SHINE Focus Foundation

on:
  pull_request:
    branches:
      - v045-clarity-pass
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply v046 source build once
        id: build
        shell: bash
        run: |
          set -o pipefail
          if [ "$(cat VERSION.txt)" != "v046" ] || [ ! -f docs/product/V046_SHINE_FOCUS_FOUNDATION.md ]; then
            {
              cat .github/v046-build.*.b64 | tr -d '\n' > /tmp/v046-build.b64
              test "$(wc -c < /tmp/v046-build.b64)" = "17136"
              test "$(sha256sum /tmp/v046-build.b64 | cut -d' ' -f1)" = "44cc73f8c88c0c1d74ca36a1bdda76ca8ff31b0d6a9c1e40b4e0081611ba85d5"
              base64 -d /tmp/v046-build.b64 > /tmp/v046-build.py.gz
              gzip -t /tmp/v046-build.py.gz
              gzip -dc /tmp/v046-build.py.gz > /tmp/build_v046.py
              python3 .github/v046-adapt.py
              sed -i "s#root=Path('/mnt/data/v046ws/repo')#root=Path.cwd()#" /tmp/build_v046.py
              python3 /tmp/build_v046.py
            } 2>&1 | tee "$RUNNER_TEMP/v046-build-report.txt"
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v046-build-report
          path: ${{ runner.temp }}/v046-build-report.txt
          if-no-files-found: warn

      - name: Static and preservation verification
        shell: bash
        run: |
          node --check app.js
          test "$(node -e "global.window={};require('./data/content.js');process.stdout.write(window.PATIENT_CARE_CONTENT.meta.contentVersion)")" = "v046"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          cmp PATIENT_CARE_CORE.md docs/PATIENT_CARE_CORE.md
          grep -Fq "const KEY = 'pc_pilot_v022_profile'" app.js
          grep -Fq "version:22" app.js
          grep -Fq "shineFocus" app.js
          ! grep -Fq 'data-add="shine"' app.js
          ! grep -R "clarity-v045" index.html app.js styles.css
          git fetch origin v045-clarity-pass
          node <<'NODE'
          const fs=require('fs');
          const vm=require('vm');
          const cp=require('child_process');
          function load(text){const context={window:{}};vm.createContext(context);vm.runInContext(text,context);return context.window.PATIENT_CARE_CONTENT;}
          const before=load(cp.execFileSync('git',['show','origin/v045-clarity-pass:data/content.js'],{encoding:'utf8'}));
          const after=load(fs.readFileSync('data/content.js','utf8'));
          const checks=[
            ['shine',before.shine,after.shine],
            ['healSections',before.healSections,after.healSections],
            ['drSections',before.drSections,after.drSections],
            ['dietBuilder.items',before.dietBuilder.items,after.dietBuilder.items],
            ['dietBuilder.focusOptions',before.dietBuilder.focusOptions,after.dietBuilder.focusOptions],
            ['meta.completedBatches',before.meta.completedBatches,after.meta.completedBatches],
            ['meta.qualityReview',before.meta.qualityReview,after.meta.qualityReview]
          ];
          for(const [label,a,b] of checks){if(JSON.stringify(a)!==JSON.stringify(b))throw new Error('Clinical content changed: '+label);}
          console.log('clinical content preserved');
          NODE

      - name: Install browser verification runtime
        shell: bash
        run: |
          mkdir -p /tmp/v046-browser
          cd /tmp/v046-browser
          npm init -y
          npm install playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Browser, responsive, persistence, and print verification
        shell: bash
        run: |
          set -o pipefail
          cat .github/v046-verify-fixed.*.b64 | tr -d '\n' > /tmp/v046-verify.b64
          test "$(wc -c < /tmp/v046-verify.b64)" = "5184"
          test "$(sha256sum /tmp/v046-verify.b64 | cut -d' ' -f1)" = "0a64016f20a30f1eff9e8c72d0146dbafdabd22e1be46a5a72f885d50d301e58"
          base64 -d /tmp/v046-verify.b64 | gzip -d > /tmp/v046-browser/verify.mjs
          python3 -m http.server 8766 --bind 127.0.0.1 > /tmp/v046-http.log 2>&1 &
          sleep 2
          cd /tmp/v046-browser
          node verify.mjs 2>&1 | tee "$RUNNER_TEMP/v046-browser-report.txt"

      - name: Upload browser verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v046-browser-report
          path: ${{ runner.temp }}/v046-browser-report.txt
          if-no-files-found: warn

      - name: Commit verified v046 source
        if: steps.build.outputs.applied == 'true' && success()
        shell: bash
        run: |
          rm -f .github/v046-build.*.b64 .github/v046-adapt.py .github/workflows/export-v045-base-for-v046.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Patient Care v046 — SHINE Focus Foundation"
          git push

      - name: Remove temporary v046 verification helpers
        if: steps.build.outputs.applied == 'false' && success()
        shell: bash
        run: |
          rm -f .github/v046-verify*.b64 .github/workflows/verify-v046.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Remove temporary v046 verification helpers"
            git push
          fi
