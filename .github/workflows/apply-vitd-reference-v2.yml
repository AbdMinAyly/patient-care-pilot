# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
# trigger: local maintenance 600 800 1000 or 50000 monthly
name: Apply vitamin D reference v2
on:
  push:
    branches: [main]
    paths:
      - '.github/apply_vitd_reference_v2.py'
      - '.github/workflows/apply-vitd-reference-v2.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply update
        run: python .github/apply_vitd_reference_v2.py
      - name: Validate
        run: |
          node --check app.js
          node -e "const fs=require('fs'),vm=require('vm');const c={window:{}};vm.createContext(c);vm.runInContext(fs.readFileSync('data/content.js','utf8'),c);"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'))"
          git diff --check
          grep -q "ADULT REFERENCE PATHWAY" app.js
          grep -q "600 IU once daily" app.js
          grep -q "50,000 IU once monthly" app.js
          grep -q "pc_pilot_v022_profile" app.js
      - name: Commit result and clean helper
        run: |
          rm -f .github/apply_vitd_reference_v2.py .github/workflows/apply-vitd-reference-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js styles.css PATIENT_CARE_RULES.md docs/HISTORY.md .github
          git commit -m "Use adult reference and local vitamin D protocols"
          git push
