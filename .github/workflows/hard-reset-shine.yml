# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Hard reset SHINE state
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/hard-reset-shine.yml
      - .github/hard-reset-shine.py
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/hard-reset-shine.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "startsWith('pc_pilot_')" app.js
          grep -q "location.reload()" app.js
          grep -q "profile().guided.shineCompleted!==true" app.js
      - run: |
          rm -f .github/hard-reset-shine.py .github/workflows/hard-reset-shine.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Hard reset all SHINE state"
          git push
