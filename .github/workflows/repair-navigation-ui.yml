# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Repair navigation UI
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-navigation-ui.yml
      - .github/repair-navigation-ui.py
permissions:
  contents: write
jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/repair-navigation-ui.py
