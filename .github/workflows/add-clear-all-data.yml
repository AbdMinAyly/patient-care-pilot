# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Add clear all data
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-clear-all-data.yml
      - .github/add-clear-all-data.py
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/add-clear-all-data.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "function clearAllSavedData" app.js
          grep -q "data-clear-all=\"1\"" app.js
          grep -q "localStorage.removeItem(KEY)" app.js
          grep -q "Clear All Data" app.js
          grep -q "pc_pilot_v022_profile" app.js
          grep -q "version:22" app.js
      - run: |
          rm -f .github/add-clear-all-data.py .github/workflows/add-clear-all-data.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add clear all data reset"
          git push
