# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Fix navigation UI
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-navigation-ui.yml
      - .github/fix-navigation-ui.py
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/fix-navigation-ui.py
