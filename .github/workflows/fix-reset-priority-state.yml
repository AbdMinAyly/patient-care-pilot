# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Fix reset priority state
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-reset-priority-state.yml
      - .github/fix-reset-priority-state.py
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/fix-reset-priority-state.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "p.guided.shineCompleted!==true" app.js
          grep -q "localStorage.removeItem(KEY)" app.js
          grep -q "shinePriorityAnswers={}" app.js
      - run: |
          rm -f .github/fix-reset-priority-state.py .github/workflows/fix-reset-priority-state.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Make clear all reset SHINE priorities"
          git push
