# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Fix SHINE bubble centering
on:
  push:
    branches: [main]
    paths:
      - .github/fix-shine-bubble-centering.py
      - .github/workflows/fix-shine-bubble-centering.yml
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/fix-shine-bubble-centering.py
      - run: |
          git diff --check
          grep -q "SHINE acronym columns true vertical centering" styles.css
      - run: |
          rm -f .github/fix-shine-bubble-centering.py .github/workflows/fix-shine-bubble-centering.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Center SHINE acronym columns visibly"
          git push
