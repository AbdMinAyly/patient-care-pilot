# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Apply progressive reveal
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-progressive-reveal.yml
      - .github/apply-progressive-reveal.py
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/apply-progressive-reveal.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');if(!window.PATIENT_CARE_CONTENT.guidedExperience.progressiveReveal)process.exit(1);console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "function renderDietWizard" app.js
          grep -q "function renderProgressiveDr" app.js
          grep -q "pc_pilot_v022_profile" app.js
          grep -q "version:22" app.js
          grep -q "dosing and schedule generation remain locked" docs/HISTORY.md
      - run: |
          rm -f .github/apply-progressive-reveal.py .github/workflows/apply-progressive-reveal.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add progressive reveal and shared medical suggestions"
          git push
