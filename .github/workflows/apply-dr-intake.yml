# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Apply DR health profile
on:
  push:
    branches: [main]
    paths:
      - .github/apply-dr-intake.py
      - .github/workflows/apply-dr-intake.yml
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/apply-dr-intake.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "function renderDoctorWelcome" app.js
          grep -q "doctorIntake" app.js
          grep -q "DR focused onboarding and health profile" styles.css
      - run: |
          rm -f .github/apply-dr-intake.py .github/workflows/apply-dr-intake.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add DR health-profile onboarding"
          git push