# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Unify back navigation
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/unify-back-navigation.yml
      - .github/unify-back-navigation.py
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 .github/unify-back-navigation.py
      - run: |
          node --check app.js
          node -e "global.window={};require('./data/content.js');console.log(window.PATIENT_CARE_CONTENT.meta.contentVersion)"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -q "function renderBackControl" app.js
          grep -q "Unified enterable-page navigation" styles.css
          grep -q "renderBackControl('#/heal','HEAL home','heal')" app.js
          grep -q "renderBackControl('#/plan','Your Plan','summary')" app.js
      - run: |
          rm -f .github/unify-back-navigation.py .github/workflows/unify-back-navigation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Unify back navigation pattern"
          git push
