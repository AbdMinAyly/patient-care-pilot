# IF YOU HAVE NOT ALREADY READ PATIENT_CARE_RULES.md, STOP AND READ IT BEFORE EDITING THIS FILE.
name: Apply v047 polish
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-v047-polish.yml
      - .github/apply-v047-polish.py
permissions:
  contents: write
jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply polish
        run: python3 .github/apply-v047-polish.py
      - name: Validate
        run: |
          node --check app.js
          test "$(node -e "global.window={};require('./data/content.js');process.stdout.write(window.PATIENT_CARE_CONTENT.meta.contentVersion)")" = "v047"
          node -e "JSON.parse(require('fs').readFileSync('data/schema.json','utf8'));console.log('schema ok')"
          git diff --check
          grep -Fq "const KEY = 'pc_pilot_v022_profile'" app.js
          grep -Fq "p.version=22" app.js
          ! grep -R "https\?://" index.html styles.css app.js data/content.js
      - name: Commit polished v047
        run: |
          rm -f .github/apply-v047-polish.py .github/workflows/apply-v047-polish.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish v047 Find and Guide"
          git push origin main
